<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAIAAAD8GO2jAAAAXklEQVR42mN4e0iPpohh1IJRC0YtGLVg0Frw89snIMLFhYjgkSVgAVw1RCcyF81ErLIkBBGyBcgMSn2A7CJMOzAROT7ADA1MV5MfRFhdR81IHs1ooxaMWjBqwfCzAAB8eK1KkpkVdQAAAABJRU5ErkJggg==">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=3">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#edc22e">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>2048</h1>
      <div class="score-container">
        <div class="score-box">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">Best</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>
    <p class="tagline">Join the numbers and get to the <strong>2048 tile!</strong></p>
    <button class="new-game-btn" id="new-game">New Game</button>
    <div class="board" id="board">
      <div class="grid-background" id="grid-bg"></div>
      <div class="tile-container" id="tile-container"></div>
    </div>
    <p class="instructions">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles.</p>
    <button class="install-btn hidden" id="install-btn">Install App</button>
    <div class="install-modal hidden" id="install-modal">
      <div class="install-modal-content">
        <button class="install-close" id="install-close">&times;</button>
        <h2>Add to Home Screen</h2>
        <div id="install-instructions"></div>
      </div>
    </div>
    <div class="overlay hidden" id="overlay">
      <div class="overlay-content">
        <p id="overlay-message"></p>
        <button class="new-game-btn" id="overlay-retry">Try Again</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
