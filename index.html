<body>
  <div class="container">
    <header>
      <h1>2048</h1>
      <div class="score-container">
        <div class="score-box">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">Best</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>
    <p class="tagline">Join the numbers and get to the <strong>2048 tile!</strong></p>
    <button class="new-game-btn" id="new-game">New Game</button>
    <div class="board" id="board">
      <div class="grid-background" id="grid-bg"></div>
      <div class="tile-container" id="tile-container"></div>
    </div>
    <p class="instructions">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles.</p>
    <div class="overlay hidden" id="overlay">
      <div class="overlay-content">
        <p id="overlay-message"></p>
        <button class="new-game-btn" id="overlay-retry">Try Again</button>
      </div>
    </div>
  </div>
  <script src="game.js?v=2"></script>
</body>
